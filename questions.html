<!DOCTYPE html>
<html>
<head>
    <title>Questions For My Love</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#ffe4ec;
            padding:20px;
            text-align:center;
        }

        h1{
            color:#ff4d6d;
        }

        .card{
            background:white;
            max-width:600px;
            margin:20px auto;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        textarea{
            width:100%;
            height:80px;
            margin-top:10px;
            padding:10px;
        }

        button{
            margin-top:10px;
            padding:10px 20px;
            background:#ff4d6d;
            color:white;
            border:none;
            cursor:pointer;
        }

        .reply{
            margin-top:15px;
            color:#333;
            font-weight:bold;
        }
    </style>
</head>
<body>

<h1>❤️ Questions For Jamuna ❤️</h1>

<div class="card">
    <h3>1. Nee enna evlo love panra? ❤️</h3>

    <textarea id="ans1"
    placeholder="Type your answer..."></textarea>

    <button onclick="showReply('ans1','reply1')">
        Submit
    </button>

    <div id="reply1" class="reply"></div>
</div>

<div class="card">
    <h3>2. Naan unakku evlo special? 💖</h3>

    <textarea id="ans2"
    placeholder="Type your answer..."></textarea>

    <button onclick="showReply('ans2','reply2')">
        Submit
    </button>

    <div id="reply2" class="reply"></div>
</div>

<div class="card">
    <h3>3. Forever en kooda iruppiya? 🥰</h3>

    <textarea id="ans3"
    placeholder="Type your answer..."></textarea>

    <button onclick="showReply('ans3','reply3')">
        Submit
    </button>

    <div id="reply3" class="reply"></div>
</div>

<div class="card">
    <h3>4. Enna first time paatha appo enna nenacha? 😊</h3>

    <textarea id="ans4"
    placeholder="Type your answer..."></textarea>

    <button onclick="showReply('ans4','reply4')">
        Submit
    </button>

    <div id="reply4" class="reply"></div>
</div>

<script>
function showReply(answerId, replyId){

    let answer =
    document.getElementById(answerId).value;

    if(answer.trim() === ""){
        alert("Please enter your answer");
        return;
    }

    document.getElementById(replyId).innerHTML =
    "❤️ Your Reply: " + answer;
}
</script>

</body>
</html>
